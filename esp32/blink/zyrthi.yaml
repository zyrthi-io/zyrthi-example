platform: esp32
chip: esp32s3

compiler:
  prefix: xtensa-esp32s3-elf-
  cflags:
    - -Os
    - -g
    - -Wall
  ldflags:
    - -nostdlib
    - -T
    - link.ld
  includes:
    - include
    - .dehub/deps/zyrthi/hal/0.1.0/include
    - .dehub/deps/zyrthi/core/0.1.0/include
    - .dehub/deps/zyrthi/hal-adapter-esp32/0.1.0/include

flash:
  plugin: https://github.com/zyrthi-io/zyrthi-platform-esp32/releases/download/v0.1.0/esp32-flash.wasm
  entry_addr: "0x0"
  default_baud: 115200

monitor:
  baud: 115200
  timestamp: true

project:
  name: blink
  sources:
    - src/
    - .dehub/deps/zyrthi/core/0.1.0/src/
    - .dehub/deps/zyrthi/hal-adapter-esp32/0.1.0/src/
