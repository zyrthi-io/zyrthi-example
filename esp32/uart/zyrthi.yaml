platform: esp32
chip: esp32

compiler:
  prefix: xtensa-esp32-elf-
  cflags:
    - -Os
    - -g
    - -Wall
  ldflags:
    - -nostdlib
  includes:
    - deps/zyrthi/hal/include
    - deps/zyrthi/core/include
    - deps/zyrthi/hal-adapter-esp32/include

flash:
  plugin: https://github.com/zyrthi-io/zyrthi-platform-esp32/releases/download/v0.1.0/esp32-flash.wasm
  entry_addr: "0x0"

monitor:
  baud: 115200
  timestamp: true

project:
  name: uart-echo
  sources:
    - src/
